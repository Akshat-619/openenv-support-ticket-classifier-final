<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Ticket Classifier</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="max-w-4xl mx-auto px-6 py-10">
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Support Ticket Classifier</h1>
      <p class="text-slate-400 mt-2">
        Basic frontend for your OpenEnv Round 1 project
      </p>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      <!-- Left -->
      <div class="md:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-lg">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Current Ticket</h2>
          <span id="statusBadge" class="px-3 py-1 rounded-full text-sm bg-slate-800 text-slate-300">
            Not Started
          </span>
        </div>

        <div id="ticketBox" class="min-h-[140px] rounded-xl bg-slate-800/70 border border-slate-700 p-5 text-slate-200 leading-7">
          Click <span class="font-semibold text-cyan-400">Start / Reset</span> to load a ticket.
        </div>

        <div class="mt-6">
          <h3 class="text-lg font-medium mb-3">Choose Action</h3>
          <div class="flex flex-wrap gap-3">
            <button onclick="sendAction('billing')" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 transition">
              Billing
            </button>
            <button onclick="sendAction('shipping')" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 transition">
              Shipping
            </button>
            <button onclick="sendAction('technical')" class="px-4 py-2 rounded-xl bg-purple-600 hover:bg-purple-500 transition">
              Technical
            </button>
          </div>
        </div>

        <div class="mt-6 flex flex-wrap gap-3">
          <button onclick="startSession()" class="px-5 py-2.5 rounded-xl bg-cyan-600 hover:bg-cyan-500 transition font-medium">
            Start / Reset
          </button>
          <button onclick="getCurrentState()" class="px-5 py-2.5 rounded-xl bg-slate-700 hover:bg-slate-600 transition font-medium">
            Get State
          </button>
        </div>
      </div>

      <!-- Right -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-lg">
        <h2 class="text-xl font-semibold mb-4">Session Info</h2>

        <div class="space-y-4 text-sm">
          <div class="rounded-xl bg-slate-800 border border-slate-700 p-4">
            <p class="text-slate-400">Step</p>
            <p id="stepValue" class="text-2xl font-bold mt-1">0</p>
          </div>

          <div class="rounded-xl bg-slate-800 border border-slate-700 p-4">
            <p class="text-slate-400">Remaining Steps</p>
            <p id="remainingValue" class="text-2xl font-bold mt-1">0</p>
          </div>

          <div class="rounded-xl bg-slate-800 border border-slate-700 p-4">
            <p class="text-slate-400">Total Reward</p>
            <p id="rewardValue" class="text-2xl font-bold mt-1">0</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div class="mt-6 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-lg">
      <h2 class="text-xl font-semibold mb-4">Last Response</h2>
      <div id="responseBox" class="rounded-xl bg-slate-800/70 border border-slate-700 p-5 text-slate-200 whitespace-pre-wrap">
        No actions yet.
      </div>
    </div>
  </div>
<script src="script.js"></script>
  
</body>
</html>
